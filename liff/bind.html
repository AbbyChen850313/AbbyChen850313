<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>帳號綁定</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <h1>帳號綁定</h1>
  <div class="subtitle" id="bindSubtitle">驗證您的身分</div>
</div>

<!-- 載入中 -->
<div id="loadingView" style="padding:40px 20px;text-align:center;color:#888">
  <div class="spinner" style="margin:0 auto 12px"></div>
  <div id="loadingStep">載入 SDK...</div>
</div>

<!-- 錯誤顯示 -->
<div id="errorView" style="display:none;margin:12px 8px;padding:14px;background:#ffebee;border-radius:8px;color:#c62828;font-size:13px">
  <strong>錯誤：</strong><span id="errorMsg"></span>
</div>

<!-- 輸入表單 -->
<div id="formView" style="display:none">
  <div class="score-section" style="margin:12px 8px">
    <div class="section-title">請輸入員工資料</div>

    <div class="setting-group">
      <label class="setting-label">姓名</label>
      <input type="text" class="setting-input" id="inputName" placeholder="請輸入您的姓名">
    </div>

    <div class="setting-group">
      <label class="setting-label">員工編號</label>
      <input type="text" class="setting-input" id="inputEmployeeId" placeholder="請輸入員工編號">
    </div>

    <div class="setting-group">
      <label class="setting-label">手機號碼</label>
      <input type="tel" class="setting-input" id="inputPhone" placeholder="例：0912345678">
    </div>

    <button class="btn btn-submit" style="width:100%;padding:14px;margin-top:4px" onclick="doBindByIdentity()">
      確認綁定
    </button>
  </div>
</div>

<!-- 已綁定畫面 -->
<div id="alreadyBoundView" style="display:none">
  <div style="padding:40px 20px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">✅</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:8px">帳號已綁定</div>
    <div style="font-size:14px;color:#555;margin-bottom:24px" id="alreadyBoundName"></div>
    <button class="btn btn-submit" style="width:80%;padding:14px" onclick="goToDashboard()">
      進入考核系統
    </button>
  </div>
</div>

<!-- 綁定成功畫面 -->
<div id="successView" style="display:none">
  <div style="padding:40px 20px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">🎉</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:8px">綁定成功！</div>
    <div style="font-size:14px;color:#555;margin-bottom:4px" id="successName"></div>
    <div style="font-size:13px;color:#888;margin-bottom:24px">
      您的帳號已完成綁定，即可開始使用。
    </div>
    <button class="btn btn-submit" style="width:80%;padding:14px" onclick="goToDashboard()">
      進入考核系統
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LIFF_ID = '2009611318-5UphK9JK';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyOdcFoG1vsk6w_ginSdxyWQSc-PgLgHcvk6qMILMPeRh0h5CMutT1c-4EFZcQVhBq9/exec';

const LS_UID = 'liff_uid';
let lineUid = '';
let displayName = '';
let liffReady = false;

function showForm() {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('formView').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorView').style.display = 'block';
}

async function init() {
  // 有快取 UID → 直接查綁定狀態，不等 LIFF
  const cachedUid = localStorage.getItem(LS_UID);
  if (cachedUid) {
    document.getElementById('loadingStep').textContent = '查詢帳號狀態...';
    try {
      const check = await Promise.race([
        callGAS('apiCheckBinding', [cachedUid]),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000)),
      ]);
      if (check && check.bound) {
        lineUid = cachedUid;
        goToDashboard();
        return;
      }
    } catch (_) { /* 查詢失敗就繼續走 LIFF */ }
  }

  // 沒快取或未綁定 → 走 LIFF 流程（背景也更新 UID）
  try {
    document.getElementById('loadingStep').textContent = 'LIFF 初始化...';
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('LIFF init timeout')), 10000)),
    ]);

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    lineUid = profile.userId;
    displayName = profile.displayName;
    liffReady = true;

    // 若快取 UID 與 LIFF 不同，更新快取
    if (lineUid !== cachedUid) localStorage.setItem(LS_UID, lineUid);

    // LIFF 取得後再查一次（防止快取 UID 過期）
    document.getElementById('loadingStep').textContent = '查詢帳號狀態...';
    const check = await Promise.race([
      callGAS('apiCheckBinding', [lineUid]),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000)),
    ]).catch(() => null);

    if (check && check.bound) {
      goToDashboard();
      return;
    }

    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('formView').style.display = 'block';
  } catch (err) {
    // LIFF 失敗但有快取 UID → 直接顯示表單（送出時再處理）
    if (cachedUid) {
      lineUid = cachedUid;
      showForm();
    } else {
      showError(err.message);
    }
  }
}

async function doBindByIdentity() {
  const name = document.getElementById('inputName').value.trim();
  const employeeId = document.getElementById('inputEmployeeId').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();

  if (!name) { showToast('請填入姓名'); return; }
  if (!employeeId) { showToast('請填入員工編號'); return; }
  if (!phone) { showToast('請填入手機號碼'); return; }
  if (!lineUid) { showToast('LINE 身分未取得，請稍後再試'); return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '驗證中...';

  const result = await callGAS('apiBindByIdentity', [lineUid, displayName, name, employeeId, phone]);

  btn.disabled = false;
  btn.textContent = '確認綁定';

  if (result.error) {
    showToast('❌ ' + result.error);
    return;
  }

  document.getElementById('successName').textContent = `您好，${result.name}！`;
  document.getElementById('formView').style.display = 'none';
  document.getElementById('successView').style.display = 'block';
  setTimeout(goToDashboard, 1500); // 1.5 秒後自動跳轉
}

function goToDashboard() {
  if (lineUid) localStorage.setItem('liff_uid', lineUid);
  location.href = 'dashboard.html';
}

function callGAS(action, args) {
  return fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action, args: args || [] }),
  }).then(r => r.json());
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

const s = document.createElement('script');
s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
s.onerror = () => showError('LINE SDK 載入失敗，請重新整理');
s.onload = init;
document.head.appendChild(s);
</script>
</body>
</html>
